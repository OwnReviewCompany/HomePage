<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OwnReview - SNSアプリの開発・運営">
    <title>OwnReview</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            color: #2c3e50;
            background-color: #fafafa;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: linear-gradient(135deg, #ffffff 0%, #f5f7fa 100%);
            opacity: 0;
            animation: fadeIn 1s ease-in forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .hero-content {
            text-align: center;
            max-width: 800px;
        }

        .logo {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #1a1a1a;
            margin-bottom: 2rem;
            animation: slideUp 0.8s ease-out 0.2s backwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tagline {
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            font-weight: 300;
            color: #5a6c7d;
            line-height: 1.8;
            animation: slideUp 0.8s ease-out 0.4s backwards;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            40% {
                transform: translateX(-50%) translateY(-10px);
            }
            60% {
                transform: translateX(-50%) translateY(-5px);
            }
        }

        .scroll-indicator::before {
            content: '';
            display: block;
            width: 24px;
            height: 24px;
            border-left: 2px solid #cbd5e0;
            border-bottom: 2px solid #cbd5e0;
            transform: rotate(-45deg);
        }

        /* About Section */
        .about {
            padding: 6rem 2rem;
            background-color: #ffffff;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .section-title {
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 2rem;
            text-align: center;
            letter-spacing: -0.01em;
        }

        .about-content {
            font-size: clamp(1rem, 2vw, 1.125rem);
            color: #5a6c7d;
            line-height: 1.9;
            text-align: center;
            max-width: 700px;
            margin: 0 auto;
        }

        /* Contact Section */
        .contact {
            padding: 6rem 2rem;
            background-color: #f5f7fa;
        }

        .contact-content {
            text-align: center;
            margin-top: 3rem;
        }

        .contact-button {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 2.5rem;
            background-color: #1a1a1a;
            color: #ffffff;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .contact-button:hover {
            background-color: #2d3748;
            transform: translateY(-2px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        .contact-button:active {
            transform: translateY(0);
        }

        .x-icon {
            width: 20px;
            height: 20px;
        }

        /* Footer */
        footer {
            padding: 3rem 2rem;
            background-color: #ffffff;
            text-align: center;
            border-top: 1px solid #e2e8f0;
        }

        .copyright {
            color: #a0aec0;
            font-size: 0.875rem;
            font-weight: 300;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero {
                min-height: 90vh;
            }

            .about, .contact {
                padding: 4rem 1.5rem;
            }

            .scroll-indicator {
                display: none;
            }
        }

        /* Utility */
        .fade-in-section {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }

        .fade-in-section.is-visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="logo">OwnReview</h1>
            <p class="tagline">SNSアプリで、人々のつながりをデザインする。</p>
        </div>
        <div class="scroll-indicator"></div>
    </section>

    <!-- About Section -->
    <section class="about fade-in-section">
        <div class="container">
            <h2 class="section-title">About</h2>
            <div class="about-content">
                <p>
                    OwnReviewは、SNSアプリケーションの開発・運営を行っています。<br>
                    ユーザー同士のつながりを大切にし、より良いコミュニケーション体験を提供することで、<br>
                    新しい価値を創造しています。
                </p>
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section class="contact fade-in-section">
        <div class="container">
            <h2 class="section-title">Contact</h2>
            <div class="contact-content">
                <a href="https://x.com/wfMDJ8cIrh11740" target="_blank" rel="noopener noreferrer" class="contact-button">
                    <svg class="x-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                    Follow us on X
                </a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p class="copyright">&copy; 2025 OwnReview</p>
    </footer>

    <script>
        // Intersection Observer for fade-in animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -100px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                }
            });
        }, observerOptions);

        // Observe all sections with fade-in class
        document.querySelectorAll('.fade-in-section').forEach((section) => {
            observer.observe(section);
        });
    </script>
</body>
</html>
